<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><script src="https://unpkg.com/lucide@latest"></script><style>
.bank { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.btn { display: inline-flex; align-items: center; gap: 6px; font-family: Inter, sans-serif; font-size: 15px; font-weight: 700; cursor: default; transition: all 0.15s; border: 0; }
.btn-primary { background: #f59e0b; color: #1e293b; padding: 14px 24px; border-radius: 9999px; box-shadow: 0 8px 24px rgba(245, 158, 11, 0.20); letter-spacing: 0.02em; }
.btn-secondary { background: #fff; color: #475569; padding: 8px 14px; border-radius: 16px; border: 1px solid #f3f4f6; box-shadow: 0 1px 2px rgba(0,0,0,0.03); }
.btn-soft-success { background: #ecfdf5; color: #047857; padding: 6px 12px; border-radius: 10px; font-size: 12px; font-weight: 600; }
.btn-soft-danger { background: #f1f5f9; color: #475569; padding: 6px 12px; border-radius: 10px; font-size: 12px; font-weight: 600; }
.btn-link { background: transparent; color: #d97706; font-weight: 700; padding: 0; }
.label { font-size: 10.5px; color: #94a3b8; font-family: 'JetBrains Mono', monospace; margin-top: 4px; }
</style></head><body>
<div class="card">
  <div class="strong" style="font-weight: 700;">Components · Buttons</div>
  <div class="bank">
    <div>
      <button class="btn btn-primary">Войти</button>
      <div class="label">Primary CTA · brand-500 · pill · slate-800 text · brand glow shadow</div>
    </div>
    <div>
      <button class="btn btn-secondary"><i data-lucide="log-out" style="width:16px;height:16px;"></i> Выйти</button>
      <div class="label">Secondary · white · gray-100 border · soft shadow</div>
    </div>
    <div>
      <button class="btn btn-soft-success">Принять</button>
      &nbsp;<button class="btn btn-soft-success" style="background:#d1fae5;">Выполнено</button>
      &nbsp;<button class="btn btn-soft-danger">Отклонить</button>
      <div class="label">Action lifecycle pills · 12px · radius-10</div>
    </div>
    <div>
      <button class="btn btn-link">Обновить</button>
      <div class="label">Link · brand-600 · hover:underline</div>
    </div>
  </div>
</div>
<script>lucide.createIcons();</script>
</body></html>
