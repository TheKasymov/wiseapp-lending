<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.bank { display: flex; flex-wrap: wrap; gap: 8px; }
.b { display: inline-flex; align-items: center; padding: 4px 12px; border-radius: 9999px; font-size: 11px; font-weight: 600; border: 1px solid; }
.b-success { background:#ecfdf5; color:#047857; border-color:#d1fae5; }
.b-warning { background:#fffbeb; color:#b45309; border-color:#fef3c7; }
.b-danger  { background:#fff1f2; color:#be123c; border-color:#ffe4e6; }
.b-info    { background:#eff6ff; color:#1d4ed8; border-color:#dbeafe; }
.b-default { background:#f8fafc; color:#475569; border-color:#f1f5f9; }
.b-brand   { background:#fef3c7; color:#92400e; border-color:#fde68a; }
.b-dot { width: 6px; height: 6px; border-radius: 999px; margin-right: 6px; display: inline-block; }
.label { font-size: 10.5px; color: #94a3b8; font-family: 'JetBrains Mono', monospace; }
</style></head><body>
<div class="card">
  <div class="strong" style="font-weight: 700;">Components · Badges & status pills</div>
  <div class="bank">
    <span class="b b-success"><span class="b-dot" style="background:#10b981;"></span>good</span>
    <span class="b b-warning"><span class="b-dot" style="background:#f59e0b;"></span>degraded</span>
    <span class="b b-danger"><span class="b-dot" style="background:#f43f5e;"></span>critical</span>
    <span class="b b-info">attention</span>
    <span class="b b-success">ok</span>
    <span class="b b-danger">high</span>
    <span class="b b-warning">medium</span>
    <span class="b b-info">low</span>
    <span class="b b-brand">12 новых</span>
    <span class="b b-default">admin</span>
    <span class="b b-default">today</span>
    <span class="b b-default">inventory</span>
  </div>
  <div class="label">Anatomy · py-0.5 px-2.5 · text-xs/600 · rounded-full · 50-tint bg · 100/200 border · 700 text</div>
</div>
</body></html>
