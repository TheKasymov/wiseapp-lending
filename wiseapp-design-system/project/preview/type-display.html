<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.scale { display: flex; flex-direction: column; gap: 8px; }
.row-spec { display: grid; grid-template-columns: 1fr 110px; gap: 16px; align-items: baseline; padding-bottom: 8px; border-bottom: 1px solid #f1f5f9; }
.row-spec:last-child { border: none; padding-bottom: 0; }
.spec { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: #94a3b8; text-align: right; }
</style></head><body>
<div class="card">
  <div class="row spread">
    <div class="strong" style="font-weight: 700;">Type · Display & Headings</div>
    <div class="faint mono" style="font-size: 11px;">Inter</div>
  </div>
  <div class="scale">
    <div class="row-spec">
      <div style="font-size: 36px; font-weight: 800; letter-spacing: -0.02em; color: #0f172a; line-height: 1.1;">wiseApp</div>
      <div class="spec">36/800<br>tracking-tight</div>
    </div>
    <div class="row-spec">
      <div style="font-size: 30px; font-weight: 700; letter-spacing: -0.02em; color: #0f172a; line-height: 1.15;">Cockpit менеджера</div>
      <div class="spec">H1 · 30/700</div>
    </div>
    <div class="row-spec">
      <div style="font-size: 24px; font-weight: 700; letter-spacing: -0.02em; color: #0f172a;">123 456 ₸</div>
      <div class="spec">KPI value · 24/700</div>
    </div>
    <div class="row-spec">
      <div style="font-size: 18px; font-weight: 600; color: #0f172a;">Ключевые риски</div>
      <div class="spec">Card title · 18/600</div>
    </div>
  </div>
</div>
</body></html>
