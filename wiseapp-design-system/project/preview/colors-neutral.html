<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.swatch { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 0; }
.chip { height: 56px; border-radius: 12px; border: 1px solid rgba(15,23,42,0.06); }
.chip.lite { border: 1px solid #e2e8f0; }
.label { font-size: 11px; font-weight: 600; color: #475569; }
.hex { font-size: 10px; color: #94a3b8; font-family: 'JetBrains Mono', monospace; }
.scale { display: flex; gap: 6px; }
</style></head><body>
<div class="card">
  <div class="row spread">
    <div class="strong" style="font-weight: 700;">Neutral · Slate</div>
    <div class="faint" style="font-size: 11px;">aliased <span class="mono">dark-*</span> in tailwind config</div>
  </div>
  <div class="scale">
    <div class="swatch"><div class="chip lite" style="background:#f8fafc"></div><span class="label">50</span><span class="hex">#f8fafc</span></div>
    <div class="swatch"><div class="chip lite" style="background:#f1f5f9"></div><span class="label">100</span><span class="hex">#f1f5f9</span></div>
    <div class="swatch"><div class="chip" style="background:#e2e8f0"></div><span class="label">200</span><span class="hex">#e2e8f0</span></div>
    <div class="swatch"><div class="chip" style="background:#cbd5e1"></div><span class="label">300</span><span class="hex">#cbd5e1</span></div>
    <div class="swatch"><div class="chip" style="background:#94a3b8"></div><span class="label">400</span><span class="hex">#94a3b8</span></div>
    <div class="swatch"><div class="chip" style="background:#64748b"></div><span class="label">500</span><span class="hex">#64748b</span></div>
    <div class="swatch"><div class="chip" style="background:#475569"></div><span class="label">600</span><span class="hex">#475569</span></div>
    <div class="swatch"><div class="chip" style="background:#334155"></div><span class="label">700</span><span class="hex">#334155</span></div>
    <div class="swatch"><div class="chip" style="background:#1e293b"></div><span class="label">800</span><span class="hex">#1e293b</span></div>
    <div class="swatch"><div class="chip" style="background:#0f172a"></div><span class="label">900</span><span class="hex">#0f172a</span></div>
    <div class="swatch"><div class="chip" style="background:#020617"></div><span class="label">950</span><span class="hex">#020617</span></div>
  </div>
  <div class="row" style="font-size: 12px; color: #64748b; padding-top: 4px; border-top: 1px solid #f1f5f9;">
    <span><b style="color:#0f172a">900</b> headings</span><span style="color:#cbd5e1">•</span>
    <span><b style="color:#1e293b">800</b> body</span><span style="color:#cbd5e1">•</span>
    <span><b style="color:#475569">600</b> muted</span><span style="color:#cbd5e1">•</span>
    <span><b style="color:#64748b">500</b> labels</span><span style="color:#cbd5e1">•</span>
    <span><b style="color:#94a3b8">400</b> faint</span>
  </div>
</div>
</body></html>
