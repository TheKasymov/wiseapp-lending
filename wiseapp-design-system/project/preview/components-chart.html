<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
body { padding: 14px; }
.chart { background: #fff; border-radius: 16px; padding: 14px 14px 8px; }
.title { font-size: 14px; font-weight: 600; color: #0f172a; margin-bottom: 8px; }
.tooltip { position: absolute; background: #fff; border: 1px solid #f1f5f9; border-radius: 12px; padding: 8px 12px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1); pointer-events: none; }
.tt-label { font-size: 11px; color: #64748b; }
.tt-value { font-size: 14px; font-weight: 700; color: #f59e0b; }
</style></head><body>
<div class="card" style="padding:14px;">
  <div class="row spread"><div class="strong" style="font-weight:700;">Components · Chart anatomy</div><div class="faint mono" style="font-size:11px;">recharts · LineChart</div></div>
  <div class="chart" style="position: relative; padding: 0;">
    <svg viewBox="0 0 600 180" width="100%" preserveAspectRatio="none" style="display:block;">
      <!-- grid -->
      <line x1="0" y1="40"  x2="600" y2="40"  stroke="#f1f5f9" stroke-dasharray="3 3"/>
      <line x1="0" y1="80"  x2="600" y2="80"  stroke="#f1f5f9" stroke-dasharray="3 3"/>
      <line x1="0" y1="120" x2="600" y2="120" stroke="#f1f5f9" stroke-dasharray="3 3"/>
      <line x1="0" y1="160" x2="600" y2="160" stroke="#f1f5f9"/>
      <!-- line -->
      <polyline fill="none" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
        points="20,140 80,120 140,128 200,90 260,98 320,70 380,82 440,55 500,72 560,40"/>
      <!-- dot -->
      <circle cx="320" cy="70" r="5" fill="#fff" stroke="#f59e0b" stroke-width="3"/>
    </svg>
    <div class="tooltip" style="left: 280px; top: 30px;">
      <div class="tt-label">пн, 12 мая</div>
      <div class="tt-value">312 450 ₸</div>
    </div>
  </div>
  <div class="row" style="font-size: 11px; color: #94a3b8; padding-top: 8px;">
    <span>x: <span class="mono">stroke #94a3b8 / 12px / no axis line</span></span>
    <span style="color:#cbd5e1;">·</span>
    <span>grid: <span class="mono">#f1f5f9 strokeDasharray='3 3'</span></span>
  </div>
</div>
</body></html>
