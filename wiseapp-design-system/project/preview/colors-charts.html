<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.scale { display: flex; gap: 8px; }
.swatch { flex: 1; display: flex; flex-direction: column; gap: 4px; }
.chip { height: 44px; border-radius: 10px; border: 1px solid rgba(15,23,42,0.06); }
.label { font-size: 11px; font-weight: 600; color: #475569; }
.hex { font-size: 10px; color: #94a3b8; font-family: 'JetBrains Mono', monospace; }
</style></head><body>
<div class="card">
  <div class="strong" style="font-weight: 700;">Charts · Recharts series</div>
  <div class="scale">
    <div class="swatch"><div class="chip" style="background:#f59e0b"></div><span class="label">amber</span><span class="hex">#f59e0b</span></div>
    <div class="swatch"><div class="chip" style="background:#10b981"></div><span class="label">emerald</span><span class="hex">#10b981</span></div>
    <div class="swatch"><div class="chip" style="background:#0ea5e9"></div><span class="label">sky</span><span class="hex">#0ea5e9</span></div>
    <div class="swatch"><div class="chip" style="background:#8b5cf6"></div><span class="label">violet</span><span class="hex">#8b5cf6</span></div>
    <div class="swatch"><div class="chip" style="background:#ef4444"></div><span class="label">red</span><span class="hex">#ef4444</span></div>
    <div class="swatch"><div class="chip" style="background:#ec4899"></div><span class="label">pink</span><span class="hex">#ec4899</span></div>
    <div class="swatch"><div class="chip" style="background:#06b6d4"></div><span class="label">cyan</span><span class="hex">#06b6d4</span></div>
    <div class="swatch"><div class="chip" style="background:#84cc16"></div><span class="label">lime</span><span class="hex">#84cc16</span></div>
    <div class="swatch"><div class="chip" style="background:#f97316"></div><span class="label">orange</span><span class="hex">#f97316</span></div>
  </div>
  <div class="faint" style="font-size: 11px; padding-top: 4px; border-top: 1px solid #f1f5f9;">
    Primary line series uses brand <span class="mono">#f59e0b</span> at <span class="mono">strokeWidth=3</span> · grid <span class="mono">#f1f5f9</span> · axis ticks <span class="mono">#94a3b8 / 12px</span>
  </div>
</div>
</body></html>
