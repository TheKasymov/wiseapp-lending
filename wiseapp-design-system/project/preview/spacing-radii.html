<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.radii { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
.r { display: flex; flex-direction: column; gap: 6px; align-items: center; }
.box { width: 100%; height: 56px; background: #fff; border: 1.5px solid #f59e0b; }
.l { font-size: 10.5px; font-weight: 600; color: #475569; font-family: 'JetBrains Mono', monospace; }
.t { font-size: 10px; color: #94a3b8; text-align: center; line-height: 1.3; }
</style></head><body>
<div class="card">
  <div class="strong" style="font-weight: 700;">Spacing · Border radii</div>
  <div class="radii">
    <div class="r"><div class="box" style="border-radius: 6px;"></div><span class="l">6</span><span class="t">chip</span></div>
    <div class="r"><div class="box" style="border-radius: 8px;"></div><span class="l">8</span><span class="t">small pill</span></div>
    <div class="r"><div class="box" style="border-radius: 12px;"></div><span class="l">12</span><span class="t">input,<br>inner</span></div>
    <div class="r"><div class="box" style="border-radius: 16px;"></div><span class="l">16 ★</span><span class="t">card<br>(rounded-2xl)</span></div>
    <div class="r"><div class="box" style="border-radius: 24px;"></div><span class="l">24</span><span class="t">modal,<br>premium</span></div>
    <div class="r"><div class="box" style="border-radius: 28px;"></div><span class="l">28</span><span class="t">hero KPI</span></div>
    <div class="r"><div class="box" style="border-radius: 9999px;"></div><span class="l">∞</span><span class="t">pill,<br>chip,<br>CTA</span></div>
  </div>
</div>
</body></html>
