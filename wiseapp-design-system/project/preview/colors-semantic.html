<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.bank { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.tone { display: flex; gap: 10px; align-items: center; padding: 10px 12px; border-radius: 12px; border: 1px solid; }
.tone .dot { width: 10px; height: 10px; border-radius: 999px; }
.tone .name { font-weight: 700; font-size: 14px; }
.tone .use { font-size: 12px; }
.s-success { background: #ecfdf5; border-color: #d1fae5; color: #047857; }
.s-warning { background: #fffbeb; border-color: #fef3c7; color: #92400e; }
.s-danger  { background: #fff1f2; border-color: #ffe4e6; color: #be123c; }
.s-info    { background: #eff6ff; border-color: #dbeafe; color: #1d4ed8; }
.s-success .dot { background: #10b981; }
.s-warning .dot { background: #f59e0b; }
.s-danger  .dot { background: #f43f5e; }
.s-info    .dot { background: #3b82f6; }
</style></head><body>
<div class="card">
  <div class="strong" style="font-weight: 700;">Semantic · Status</div>
  <div class="bank">
    <div class="tone s-success"><span class="dot"></span><div><div class="name">Success</div><div class="use">emerald · KPI ↑, sync good</div></div></div>
    <div class="tone s-warning"><span class="dot"></span><div><div class="name">Warning</div><div class="use">amber · coverage limit, medium</div></div></div>
    <div class="tone s-danger"><span class="dot"></span><div><div class="name">Danger</div><div class="use">rose · churn, critical, logout</div></div></div>
    <div class="tone s-info"><span class="dot"></span><div><div class="name">Info</div><div class="use">blue · sync warmup, hint</div></div></div>
  </div>
</div>
</body></html>
