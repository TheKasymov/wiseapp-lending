<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><script src="https://unpkg.com/lucide@latest"></script><style>
body { padding: 14px; }
.grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; }
.cell { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 12px 6px; background: #f9fafb; border-radius: 10px; }
.cell .name { font-size: 10px; color: #64748b; font-family: 'JetBrains Mono', monospace; }
.cell i { color: #475569; }
</style></head><body>
<div class="card">

  </div>

    <div class="cell"><i data-lucide="grid-3x3" style="width:22px;height:22px;"></i><span class="name">grid-3x3</span></div>
    <div class="cell"><i data-lucide="trending-up" style="width:22px;height:22px;"></i><span class="name">trending-up</span></div>
